<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎲 CrapsIQ - Login</title>
    <link rel="stylesheet" href="auth.css">
</head>
<body>

<div class="auth-container">
    
    <div class="auth-card">
        <div class="auth-header">
            <h1>🎲 CrapsIQ</h1>
            <p>Live Dealer AI Assistant</p>
        </div>

        <!-- Login Form -->
        <div id="loginForm" class="auth-form">
            <h2>Login</h2>
            <form onsubmit="handleLogin(event)">
                <input type="text" id="loginUsername" placeholder="Username" required class="input-field">
                <input type="password" id="loginPassword" placeholder="Password" required class="input-field">
                <button type="submit" class="btn btn-login">Sign In</button>
            </form>
            <p class="form-toggle">
                Don't have an account? 
                <a href="#" onclick="switchToRegister(event)">Sign Up</a>
            </p>
            <div id="loginError" class="error-message"></div>
        </div>

        <!-- Register Form -->
        <div id="registerForm" class="auth-form" style="display: none;">
            <h2>Create Account</h2>
            <form onsubmit="handleRegister(event)">
                <input type="text" id="regUsername" placeholder="Username" required class="input-field">
                <input type="email" id="regEmail" placeholder="Email" required class="input-field">
                <input type="password" id="regPassword" placeholder="Password" required class="input-field">
                <input type="password" id="regConfirmPassword" placeholder="Confirm Password" required class="input-field">
                <button type="submit" class="btn btn-register">Create Account</button>
            </form>
            <p class="form-toggle">
                Already have an account? 
                <a href="#" onclick="switchToLogin(event)">Sign In</a>
            </p>
            <div id="registerError" class="error-message"></div>
        </div>

        <!-- Demo Mode -->
        <div class="demo-section">
            <p class="demo-text">Demo Account:</p>
            <p class="demo-creds">Username: <strong>demo</strong></p>
            <p class="demo-creds">Password: <strong>demo123</strong></p>
            <button class="btn btn-demo" onclick="demoLogin()">Try Demo</button>
        </div>
    </div>

    <div class="auth-background">
        <div class="gradient-1"></div>
        <div class="gradient-2"></div>
        <div class="gradient-3"></div>
    </div>

</div>

<script src="auth.js"></script>

</body>
</html>
